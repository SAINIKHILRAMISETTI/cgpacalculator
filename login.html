<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – CGPA Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* Reuse design system variables from index.html */
    :root {
      --bg-gradient: linear-gradient(135deg, #0a0816 0%, #05040a 50%, #020104 100%);
      --bg-card: rgba(255, 255, 255, 0.03);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
      --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #6366f1 50%, #3b82f6 100%);
      --transition-speed: 0.3s;
    }
    body {
      margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-gradient); color: var(--text-primary);
      display: flex; align-items: center; justify-content: center; height: 100vh;
    }
    .card {
      background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 40px; width: 320px; backdrop-filter: blur(25px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    h2 { margin: 0 0 24px; font-size: 1.5rem; text-align: center; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .input-group { margin-bottom: 18px; }
    label { display: block; margin-bottom: 4px; font-size: 0.9rem; color: var(--text-secondary); }
    input { width: 100%; padding: 10px 12px; background: rgba(255,255,255,0.07); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); font-size: 0.95rem; }
    input:focus { outline: none; border-color: var(--accent-gradient); box-shadow: 0 0 10px var(--accent-gradient); }
    button { width: 100%; padding: 12px; background: var(--accent-gradient); border: none; border-radius: 10px; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform var(--transition-speed); }
    button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99,102,241,0.5); }
    .msg { margin-top: 12px; text-align: center; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Login</h2>
    <form id="loginForm">
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required />
      </div>
      <button type="submit">Sign In</button>
    </form>
    <div class="msg" id="msg"></div>
  </div>
  <script src="auth.js"></script>
</body>
</html>
